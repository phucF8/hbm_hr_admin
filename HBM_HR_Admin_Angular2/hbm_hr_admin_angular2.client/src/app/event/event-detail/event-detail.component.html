<div class="dialog-container">
  <div class="dialog-header">
    <h2>{{ isEditMode ? 'Chỉnh sửa' : 'Tạo mới' }}</h2>
    <button class="close-button" (click)="onCancel()">
      <i class="bi bi-x-lg"></i>
    </button>
  </div>

  <div class="dialog-body">
    <form [formGroup]="eventForm" (ngSubmit)="onSubmit()">
      
      <!-- Tiêu đề -->
      <div class="form-group">
        <label class="required">Tiêu đề</label>
        <input 
          type="text" 
          class="form-control" 
          formControlName="title"
          placeholder="Nhập tiêu đề event"
          [class.is-invalid]="title?.invalid && title?.touched">
        <div class="error-message" *ngIf="title?.invalid && title?.touched">
          <span *ngIf="title?.errors?.['required']">Tiêu đề là bắt buộc</span>
          <span *ngIf="title?.errors?.['minlength']">Tiêu đề phải có ít nhất 3 ký tự</span>
        </div>
      </div>

      <!-- Nội dung hiển thị -->
      <div class="form-group">
        <label class="required">Nội dung hiển thị</label>
        <textarea 
          class="form-control textarea-large" 
          formControlName="content"
          placeholder="Nhập nội dung văn bản muốn hiển thị"
          [class.is-invalid]="content?.invalid && content?.touched">
        </textarea>
        <div class="error-message" *ngIf="content?.invalid && content?.touched">
          <span *ngIf="content?.errors?.['required']">Nội dung là bắt buộc</span>
          <span *ngIf="content?.errors?.['minlength']">Nội dung phải có ít nhất 10 ký tự</span>
        </div>
        
      </div>

      <!-- Hình nền -->
      <div class="form-group">
        <label>Hình nền</label>
        <div class="file-upload-container">
          <input 
            type="file" 
            #fileInput
            (change)="onImageSelected($event)"
            accept="image/*"
            style="display: none;">
          <button 
            type="button"
            class="btn btn-file-upload"
            (click)="fileInput.click()">
            <i class="bi bi-cloud-upload"></i> Chọn hình nền
          </button>
          <span class="file-name" *ngIf="selectedImageName">
            {{ selectedImageName }}
          </span>
        </div>
        <small class="form-hint">Chọn file ảnh để làm hình nền event (không bắt buộc)</small>
      </div>

      <!-- Preview ảnh -->
      <div class="image-preview" *ngIf="previewUrl">
        <img [src]="previewUrl" alt="Preview" (error)="previewUrl = null">
      </div>

      <!-- Ngày bắt đầu, kết thúc và mức độ ưu tiên -->
      <div class="form-row">
        <div class="form-group" style="flex: 1;">
          <label class="required">Ngày bắt đầu</label>
          <input 
            type="date" 
            class="form-control" 
            formControlName="startDate"
            [class.is-invalid]="startDate?.invalid && startDate?.touched">
          <div class="error-message" *ngIf="startDate?.invalid && startDate?.touched">
            <span *ngIf="startDate?.errors?.['required']">Ngày bắt đầu là bắt buộc</span>
          </div>
        </div>

        <div class="form-group" style="flex: 1;">
          <label>Ngày kết thúc</label>
          <input 
            type="date" 
            class="form-control" 
            formControlName="endDate">
        </div>

        <div class="form-group" style="flex: 1;">
          <label>Mức độ ưu tiên</label>
          <input 
            type="number" 
            class="form-control" 
            formControlName="priority"
            placeholder="0"
            min="0">
          <small class="form-hint">Số càng nhỏ càng ưu tiên</small>
        </div>
      </div>

      <!-- Trạng thái hiển thị -->
      <div class="form-group" style="padding: 12px; background-color: #f8f9fa; border-radius: 4px; border-left: 3px solid #6c63ff;">
        <label class="checkbox-label" style="margin: 0; display: flex; align-items: center; gap: 8px;">
          <input 
            type="checkbox" 
            formControlName="isActive"
            style="width: 18px; height: 18px; cursor: pointer;">
          <span style="font-weight: 500;">Hiển thị event trên mobile app</span>
        </label>
      </div>

      <!-- Buttons -->
      <div class="dialog-actions">
        <button type="button" class="btn btn-cancel" (click)="onCancel()" [disabled]="isSubmitting">
          Hủy
        </button>
        <button type="submit" class="btn btn-submit" [disabled]="isSubmitting">
          <span *ngIf="!isSubmitting">{{ isEditMode ? 'Cập nhật' : 'Tạo mới' }}</span>
          <span *ngIf="isSubmitting">
            <i class="bi bi-hourglass-split"></i> Đang xử lý...
          </span>
        </button>
      </div>

    </form>
  </div>
</div>
